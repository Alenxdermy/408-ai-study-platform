services:
  mongo:
    image: mongo:7
    container_name: ai-408-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  chroma:
    image: chromadb/chroma:latest
    container_name: ai-408-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
  server:
    build:
      context: ./server
    env_file:
      - .env
    depends_on:
      - mongo
      - chroma
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongo_data:
  chroma_data:
